<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="src/assets/ico.webp" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/style.css">
  <title>Wolfey</title>
</head>

<body>
  <div class="h-screen flex flex-wrap font-nunito text-white select-none overflow-x-hidden">
    <div
      class="bg-gradient-to-r from-orange-500 via-orange-500 to-yellow-500 h-full w-full lg:w-[50%] flex flex-col justify-around items-center">
      <a href="#">
        <h1 class="text-[70px] lg:text-[120px] px-16 drop-shadow-xl text-orange-100">WOLFEY</h1>
      </a>
      <div class="w-full flex justify-center">
        <a href="https://github.com/WoIfey" target="_blank"

          <h1 class="text-[70px] lg:text-[120px] px-16 mb-4">GITHUB</h1>
        </a>
      </div>
      <div class="sm:hidden block">
        <img src="src/assets/arrow-down.svg" alt="Down" class="bg-orange-200 rounded-full p-2">

    </div>
    <div class="bg-[#1b1b1b] h-full w-full lg:w-[50%] flex justify-center items-center flex-col">

      </div>
      <div
        class="h-[25%] w-[80%] lg:w-[60%] lg:h-[30%] mb-16 transition-all duration-300 ease-in-out transform hover:scale-105">
        <p class="text-xl lg:text-[25px] mb-1 text-center">Shortener</p>
        <a href="https://woifey.github.io/Shortener/" target="_blank">
          <img src="src/assets/1.png" alt="Shortener"
            class="rounded-3xl bg-cover bg-no-repeat w-full h-full object-cover">
        </a>
      </div>
    </div>
  </div>
